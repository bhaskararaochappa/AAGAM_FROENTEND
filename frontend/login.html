<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AAGAM – Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    header {
      background: #ccff99;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    header h1 {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0;
    }

    .login-box {
      background: #fff;
      max-width: 400px;
      margin: 60px auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #8b2be2;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      display: none;
    }

    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }

    .aagam-info {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 20px;
    }

    .info-card {
      background: #fff;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }

    footer {
      background: #fff;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

<header>
  <h1>
    <img src="https://raw.githubusercontent.com/chavitinibalaji/aagam-assets/main/IMG_AAGAM.png" width="70" />
    AAGAM
  </h1>
</header>

<div class="login-box">

  <h2>Login to AAGAM</h2>

  <div class="form-group">
    <label>Phone</label>
    <input type="phone" id="phone" placeholder="your phone number" />
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Your password" />
  </div>

  <button onclick="login()">Login</button>
  <div id="login-msg" class="message"></div>

  <p style="text-align: center; margin-top: 20px;">
    Don't have an account? <a href="register.html" style="color: #8b2be2;">Register here</a>
  </p>

</div>

<section class="aagam-info">
  <h2>Why Choose AAGAM?</h2>

  <div class="info-grid">
    <div class="info-card">⚡ 10-Minute Delivery</div>
    <div class="info-card">🥬 Fresh & Trusted</div>
    <div class="info-card">💳 Secure Payments</div>
    <div class="info-card">📍 Local Stores</div>
  </div>
</section>

<footer>© 2026 AAGAM. All rights reserved.</footer>

<script>
  function showMessage(id, msg, error) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = "message " + (error ? "error" : "success");
    el.style.display = "block";
  }




async function login() {
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!phone || !password) {
        showMessage("login-msg", "Please fill all fields", true);
        return;
    }

    try {
        const response = await fetch('http://localhost:8080/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, password })
        });

        const contentType = response.headers.get("content-type");

        // Parse JSON only if content-type is JSON
        let data = {};
        if (contentType && contentType.includes("application/json")) {
            data = await response.json();
            //alert(JSON.stringify(data));
        } else {
            const text = await response.text();
            console.error("Non-JSON response:", text);
            showMessage("login-msg", "Server returned non-JSON response", true);
            return;
        }

        if (response.ok) {
           
                const role = Array.isArray(data.role) ? data.role[0] : data.role;
                localStorage.removeItem('token');

                        localStorage.setItem('token', data.token);
                        localStorage.setItem('userRole', role);

             showMessage("login-msg", "Login successful!", false);

              if (role === "ADMIN") {
                  window.location.href = "addProduct.html";
              } else {
               // alert("Welcome " + (data.name || "User") + "! Redirecting to homepage...");
               
                  window.location.href = "index.html";
              }
        

        } else {
            showMessage("login-msg", data.message || "Login failed", true);
        }

    } catch (err) {
        console.error("Login error:", err);
        showMessage("login-msg", "Network error or CORS issue", true);
    }
}
</script>

</body>
</html>
